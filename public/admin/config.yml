backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/noticias"
public_folder: "/assets/noticias"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "src/data/noticias"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen Principal", name: "thumbnail", widget: "image"}
      - {label: "Resumen", name: "resumen", widget: "text"}
      - {label: "Cuerpo", name: "body", widget: "markdown"}
