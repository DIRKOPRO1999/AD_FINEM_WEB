<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <!-- AQUÍ ESTÁ EL CAMBIO DEL ÍCONO -->
    <!-- Asegúrate de que tu imagen se llame favicon.png y esté en la carpeta public -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- AQUÍ ESTÁ EL CAMBIO DEL NOMBRE EN LA PESTAÑA -->
    <title>Ad Finem | Consultores Jurídicos</title>
    
    <meta name="description" content="Expertos en Derecho Laboral y Seguridad Social. Consultoría jurídica liderada por exjueces y exmagistrados." />

    <!-- Netlify Identity: necesario para recuperación de contraseña y login -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', user => {
          // Si llega con recovery_token, abrir el widget de recuperación
          if (!user && window.location.hash && window.location.hash.includes('recovery_token')) {
            window.netlifyIdentity.open('recovery');
          }
        });
        window.netlifyIdentity.init();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
